apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: secret-writer
spec:
  # Add fields here
  authentication: 
    path: kubernetes
    role: policy-admin
  path: kubernetes
  aliasNameSource: "serviceaccount_uid"
  tokenType: "default"
  policies:
    - secret-writer
  targetNamespaces:
    targetNamespaceSelector:
      matchLabels:
        database-engine-admin: "true"