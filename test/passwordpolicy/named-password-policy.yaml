apiVersion: redhatcop.redhat.io/v1alpha1
kind: PasswordPolicy
metadata:
  name: test-named-pp-metadata
spec:
  authentication:
    path: kubernetes
    role: policy-admin
  name: test-named-password-policy
  passwordPolicy: |
    length = 10
    rule "charset" {
      charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
    }
