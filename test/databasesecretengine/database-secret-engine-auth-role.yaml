apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: database-engine-admin
spec:
  authentication:
    path: kubernetes
    role: policy-admin
  path: kubernetes
  aliasNameSource: "serviceaccount_uid"
  tokenType: "default"
  policies:
    - database-engine-admin
  targetServiceAccounts:
  - default
  targetNamespaces:
    targetNamespaces:
    - test-vault-config-operator
