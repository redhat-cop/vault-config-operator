# Quay Secret Engine — Complete Example
#
# This example creates a Quay secret engine mount, configures the connection
# to a Quay registry, and creates both a dynamic role and a static role for
# managing robot account credentials.
#
# Resources are ordered by dependency:
#   1. SecretEngineMount — creates the secret engine mount point in Vault
#   2. QuaySecretEngineConfig — configures the Quay API connection
#   3. QuaySecretEngineRole — defines dynamic robot account generation with TTL
#   4. QuaySecretEngineStaticRole — defines a static robot account (no TTL)
#
# Prerequisites:
#   - The vault-plugin-secrets-quay plugin must be registered in Vault
#   - A Kubernetes Secret "quay-admin-token" containing the Quay API token
#     (the token key name must match the passwordKey value)
#
# Apply with: kubectl apply -f secret-quay.yaml

apiVersion: redhatcop.redhat.io/v1alpha1
kind: SecretEngineMount
metadata:
  name: quay
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Secret engine type to mount — use the registered plugin name
  type: vault-plugin-secrets-quay
  # Vault mount path prefix — resulting engine path: quay-demo/quay
  path: quay-demo
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: QuaySecretEngineConfig
metadata:
  name: quay-config
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: quay-demo/quay
  # Quay instance URL
  url: https://quay.example.com
  # Disable SSL verification (set to true for self-signed certificates)
  disableSslVerification: false
  # Kubernetes Secret containing the Quay API token
  # Critical: passwordKey must match the key name in your secret that holds the token
  rootCredentials:
    secret:
      name: quay-admin-token
    passwordKey: token
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: QuaySecretEngineRole
metadata:
  name: ci-robot
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: quay-demo/quay
  # Quay organization or user that owns the repositories
  namespaceName: my-org
  # Namespace type — organization (default) or user
  namespaceType: organization
  # Allow the robot account to create new repositories
  createRepositories: false
  # Default permission for newly created repositories
  defaultPermission: read
  # TTL for the generated robot account credentials
  TTL: 1h
  maxTTL: 24h
  # Team memberships for the robot account (team_name: role)
  teams:
    dev-team: member
  # Repository permissions for the robot account (repo_name: permission)
  repositories:
    my-app: write
    shared-images: read
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: QuaySecretEngineStaticRole
metadata:
  name: build-robot
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  # Read credentials via: vault read {path}/static-creds/{name}
  path: quay-demo/quay
  # Quay organization or user that owns the repositories
  namespaceName: my-org
  # Namespace type — organization (default) or user
  namespaceType: organization
  # Allow the robot account to create new repositories
  createRepositories: false
  # Repository permissions for the static robot account (repo_name: permission)
  repositories:
    build-artifacts: write
    release-images: admin
