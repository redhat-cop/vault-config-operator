# PKI Secret Engine — Complete Example
#
# This example creates a PKI secret engine mount, configures a root certificate
# authority, and creates a role for issuing TLS certificates.
#
# Resources are ordered by dependency:
#   1. SecretEngineMount — creates the secret engine mount point in Vault
#   2. PKISecretEngineConfig — configures the root CA with subject, key, and URL settings
#   3. PKISecretEngineRole — defines certificate issuance policies
#
# Prerequisites:
#   - No external secrets required — the root CA key is generated internally by Vault
#
# Apply with: kubectl apply -f secret-pki.yaml

apiVersion: redhatcop.redhat.io/v1alpha1
kind: SecretEngineMount
metadata:
  name: pki
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Secret engine type to mount
  type: pki
  # Vault mount path prefix — resulting engine path: pki-demo/pki
  path: pki-demo
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: PKISecretEngineConfig
metadata:
  name: root-ca
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: pki-demo/pki
  # CA type — root generates a self-signed CA; intermediate generates a CSR
  type: root
  # Key generation mode — internal keeps the key in Vault; exported returns it
  privateKeyType: internal
  # Common Name for the root CA certificate
  commonName: example.com Root CA
  # Certificate validity period (8760h = 1 year)
  TTL: "8760h"
  # Output format for the certificate
  format: pem
  # Key algorithm and size
  keyType: rsa
  keyBits: 4096
  # Maximum depth of CA chain (-1 = unlimited)
  maxPathLength: -1
  # Certificate subject fields
  organization: Example Corp
  country: US
  province: California
  locality: San Francisco
  # URLs embedded into issued certificates for CA and CRL retrieval
  issuingCertificates:
    - "https://vault.example.com/v1/pki-demo/ca"
  CRLDistributionPoints:
    - "https://vault.example.com/v1/pki-demo/crl"
  # CRL validity period
  CRLExpiry: "72h"
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: PKISecretEngineRole
metadata:
  name: web-server
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: pki-demo/pki
  # Domains this role can issue certificates for
  allowedDomains:
    - example.com
    - internal.example.com
  # Allow issuing certificates for subdomains (e.g., app.example.com)
  allowSubdomains: true
  # Disallow issuing certificates for bare domain names
  allowBareDomains: false
  # Default and maximum certificate validity
  TTL: "24h"
  maxTTL: "720h"
  # Key algorithm and size for issued certificates
  keyType: rsa
  keyBits: 2048
  # Allowed key usage values
  keyUsage:
    - DigitalSignature
    - KeyEncipherment
  # Allowed extended key usage values
  extKeyUsage:
    - ServerAuth
  # Use the CN from a submitted CSR rather than the request body
  useCSRCommonName: true
  # Use SANs from a submitted CSR rather than the request body
  useCSRSans: true
  # Require a Common Name when generating certificates
  requireCn: true
  # Backdate NotBefore by 30 seconds to account for clock skew
  notBeforeDuration: "30s"
