# Kubernetes Secret Engine — Complete Example
#
# This example creates a Kubernetes secret engine mount, configures it to
# connect to the Kubernetes API, and creates a role for generating dynamic
# service account tokens with scoped RBAC permissions.
#
# Resources are ordered by dependency:
#   1. SecretEngineMount — creates the secret engine mount point in Vault
#   2. KubernetesSecretEngineConfig — configures the Kubernetes API connection
#   3. KubernetesSecretEngineRole — defines dynamic credential generation rules
#
# Prerequisites:
#   - A Kubernetes Secret "vault-se-sa-token" of type kubernetes.io/service-account-token
#     containing a service account JWT with permissions to create service accounts,
#     secrets, role bindings, and cluster role bindings
#
# Note: The mount path uses "kubernetes-se-demo" (not "kubernetes") to avoid
#       confusion with the Kubernetes auth engine mount.
#
# Apply with: kubectl apply -f secret-kubernetes.yaml

apiVersion: redhatcop.redhat.io/v1alpha1
kind: SecretEngineMount
metadata:
  name: kubernetes-se
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Secret engine type to mount
  type: kubernetes
  # Vault mount path prefix — resulting engine path: kubernetes-se-demo/kubernetes-se
  path: kubernetes-se-demo
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesSecretEngineConfig
metadata:
  name: kubernetes-se-config
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: kubernetes-se-demo/kubernetes-se
  # Kubernetes API server URL (default for in-cluster)
  kubernetesHost: https://kubernetes.default.svc:443
  # Disable defaulting to the local CA cert and SA JWT when running in a K8s pod
  disableLocalCAJWT: false
  # Kubernetes Secret containing the service account JWT used by Vault
  # Must be of type kubernetes.io/service-account-token
  jwtReference:
    secret:
      name: vault-se-sa-token
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesSecretEngineRole
metadata:
  name: app-deployer
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: kubernetes-se-demo/kubernetes-se
  # Namespaces where credentials can be generated — use ["*"] for all namespaces
  allowedKubernetesNamespaces:
    - app-namespace
    - staging-namespace
  # Pre-existing ClusterRole to bind to the generated service account
  # Mutually exclusive with serviceAccountName and generateRoleRules
  kubernetesRoleName: app-deployer-role
  # Whether the Kubernetes role is a Role or ClusterRole
  kubernetesRoleType: ClusterRole
  # TTL for the generated credentials
  defaultTTL: 1h
  maxTTL: 24h
  # Template for generating service account names
  nameTemplate: "v-{{ .RoleName }}-{{ unix_time }}"
  # Namespace label selector for dynamic namespace resolution
  # Alternative to allowedKubernetesNamespaces for dynamic environments
  targetNamespaces:
    targetNamespaceSelector:
      matchLabels:
        vault-managed: "true"
