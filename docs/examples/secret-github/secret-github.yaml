# GitHub Secret Engine — Complete Example
#
# This example creates a GitHub secret engine mount, configures a GitHub App
# connection, and creates a permission set for generating scoped access tokens.
#
# Resources are ordered by dependency:
#   1. SecretEngineMount — creates the secret engine mount point in Vault
#   2. GitHubSecretEngineConfig — configures the GitHub App credentials
#   3. GitHubSecretEngineRole — defines repository and permission scoping
#
# Prerequisites:
#   - The vault-plugin-secrets-github plugin must be registered in Vault
#   - A Kubernetes Secret "github-app-private-key" of type kubernetes.io/ssh-auth
#     containing the GitHub App's private key in the "ssh-privatekey" field
#   - A GitHub App with the desired permissions installed on your organization
#
# Apply with: kubectl apply -f secret-github.yaml

apiVersion: redhatcop.redhat.io/v1alpha1
kind: SecretEngineMount
metadata:
  name: github
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Secret engine type to mount — use the registered plugin name
  type: vault-plugin-secrets-github
  # Vault mount path prefix — resulting engine path: github-demo/github
  path: github-demo
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: GitHubSecretEngineConfig
metadata:
  name: github-config
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: github-demo/github
  # GitHub App's numeric Application ID (find in GitHub App settings)
  applicationID: 123456
  # GitHub API base URL — change for GitHub Enterprise Server
  gitHubAPIBaseURL: "https://api.github.com"
  # Kubernetes Secret containing the GitHub App private key (kubernetes.io/ssh-auth type)
  # Note: field name uses double-capital S — sSHKeyReference, not sshKeyReference
  sSHKeyReference:
    secret:
      name: github-app-private-key
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: GitHubSecretEngineRole
metadata:
  name: ci-access
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  # Note: Vault path uses "permissionset" not "roles": {path}/permissionset/{name}
  path: github-demo/github
  # Organization where the GitHub App is installed
  # Use organizationName or installationID — at least one is required
  organizationName: my-org
  # Repositories the generated token can access
  repositories:
    - my-app
    - my-lib
  # Permission scopes for the generated token (permission_name: access_type)
  # Omit entirely to inherit all permissions from the GitHub App
  permissions:
    contents: read
    pull_requests: write
    issues: read
