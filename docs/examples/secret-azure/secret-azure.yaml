# Azure Secret Engine — Complete Example
#
# This example creates an Azure secret engine mount, configures the connection
# to Azure AD, and creates a role for generating dynamic service principal credentials.
#
# Resources are ordered by dependency:
#   1. SecretEngineMount — creates the secret engine mount point in Vault
#   2. AzureSecretEngineConfig — configures the Azure subscription and credentials
#   3. AzureSecretEngineRole — defines Azure role assignments for generated SPs
#
# Prerequisites:
#   - A Kubernetes Secret "azure-sp-credentials" of type kubernetes.io/basic-auth
#     with "clientid" and "clientsecret" keys containing an Azure service principal
#     that has permissions to create and manage other service principals
#
# Note: The mount path uses "azure-se-demo" (not "azure") to avoid confusion
#       with the Azure auth engine mount.
#
# Apply with: kubectl apply -f secret-azure.yaml

apiVersion: redhatcop.redhat.io/v1alpha1
kind: SecretEngineMount
metadata:
  name: azure-se
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Secret engine type to mount
  type: azure
  # Vault mount path prefix — resulting engine path: azure-se-demo/azure-se
  path: azure-se-demo
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: AzureSecretEngineConfig
metadata:
  name: azure-se-config
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: azure-se-demo/azure-se
  # Azure subscription ID
  subscriptionID: "00000000-0000-0000-0000-000000000000"
  # Azure Active Directory tenant ID
  tenantID: "11111111-1111-1111-1111-111111111111"
  # Azure cloud environment
  environment: AzurePublicCloud
  # How long the root password is valid after rotation
  rootPasswordTTL: "182d"
  # Kubernetes Secret containing Azure service principal credentials
  # Omit azureCredentials to use AZURE_* environment variables instead
  azureCredentials:
    secret:
      name: azure-sp-credentials
    usernameKey: clientid
    passwordKey: clientsecret
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: AzureSecretEngineRole
metadata:
  name: contributor-role
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: azure-se-demo/azure-se
  # Azure role assignments — MUST be a JSON-encoded string (not a YAML list)
  azureRoles: '[{"role_name":"Contributor","scope":"/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/my-resource-group"}]'
  # Azure group memberships — also a JSON-encoded string (uncomment to use)
  # azureGroups: '[{"group_id":"22222222-2222-2222-2222-222222222222"}]'
  # TTL for generated service principal credentials
  TTL: 1h
  maxTTL: 24h
  # Keep the service principal across credential generations (false = new SP each time)
  persistApp: false
