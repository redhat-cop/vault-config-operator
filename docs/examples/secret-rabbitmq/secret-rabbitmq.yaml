# RabbitMQ Secret Engine — Complete Example
#
# This example creates a RabbitMQ secret engine mount, configures the connection
# to a RabbitMQ cluster, and creates a role for dynamic credential generation.
#
# Resources are ordered by dependency:
#   1. SecretEngineMount — creates the secret engine mount point in Vault
#   2. RabbitMQSecretEngineConfig — configures the RabbitMQ management API connection
#   3. RabbitMQSecretEngineRole — defines vhost permissions for generated users
#
# Prerequisites:
#   - A Kubernetes Secret "rabbitmq-admin-password" with keys "username" and "password"
#     containing the RabbitMQ admin credentials
#   - A running RabbitMQ cluster with the management plugin enabled
#
# Apply with: kubectl apply -f secret-rabbitmq.yaml

apiVersion: redhatcop.redhat.io/v1alpha1
kind: SecretEngineMount
metadata:
  name: rabbitmq
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Secret engine type to mount
  type: rabbitmq
  # Vault mount path prefix — resulting engine path: rabbitmq-demo/rabbitmq
  path: rabbitmq-demo
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: RabbitMQSecretEngineConfig
metadata:
  name: rabbitmq-config
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: rabbitmq-demo/rabbitmq
  # RabbitMQ management API URL (must include the management port, typically 15672)
  connectionURI: https://rabbitmq.example.com:15672
  # Verify connection to RabbitMQ during configuration
  verifyConnection: true
  # Lease TTL for generated credentials, in seconds (86400 = 24 hours)
  leaseTTL: 86400
  # Maximum lease TTL, in seconds (172800 = 48 hours)
  leaseMaxTTL: 172800
  # Kubernetes Secret containing the RabbitMQ admin credentials
  rootCredentials:
    secret:
      name: rabbitmq-admin-password
    usernameKey: username
    passwordKey: password
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: RabbitMQSecretEngineRole
metadata:
  name: app-reader
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: rabbitmq-demo/rabbitmq
  # RabbitMQ management tags — controls access level in the management UI
  tags: "monitoring"
  # Vhost permissions for generated users
  # Note: use only a single vhost entry — multi-entry has a known serialization bug
  vhosts:
    - vhostName: "/"
      permissions:
        # Regex patterns controlling configure, write, and read access
        # ".*" grants access to all queues/exchanges; "" denies all
        configure: ""
        write: ""
        read: ".*"
