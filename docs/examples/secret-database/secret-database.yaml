# Database Secret Engine — Complete Example
#
# This example creates a database secret engine mount, configures a PostgreSQL
# connection, and creates both a dynamic role and a static role.
#
# Resources are ordered by dependency:
#   1. SecretEngineMount — creates the secret engine mount point in Vault
#   2. DatabaseSecretEngineConfig — configures the database connection
#   3. DatabaseSecretEngineRole — defines dynamic credential generation
#   4. DatabaseSecretEngineStaticRole — manages password rotation for an existing user
#
# Prerequisites:
#   - A Kubernetes Secret "postgresql-admin-password" of type kubernetes.io/basic-auth
#     containing the database root credentials
#   - A running PostgreSQL instance reachable from Vault
#
# Apply with: kubectl apply -f secret-database.yaml

apiVersion: redhatcop.redhat.io/v1alpha1
kind: SecretEngineMount
metadata:
  name: database
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Secret engine type to mount
  type: database
  # Vault mount path prefix — resulting engine path: database-demo/database
  path: database-demo
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: DatabaseSecretEngineConfig
metadata:
  name: postgresql-config
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: database-demo/database
  # Database plugin — use postgresql-database-plugin for PostgreSQL
  pluginName: postgresql-database-plugin
  # Roles allowed to use this connection — list specific role names for security
  allowedRoles:
    - read-only
    - read-write
    - app-user-rotation
  # Connection URL with {{username}} and {{password}} placeholders for Vault
  connectionURL: "postgresql://{{username}}:{{password}}@my-postgresql.my-namespace.svc:5432/mydb"
  # Password authentication method — scram-sha-256 is more secure than plaintext
  passwordAuthentication: scram-sha-256
  # Kubernetes Secret containing the database admin credentials (basic-auth type)
  rootCredentials:
    secret:
      name: postgresql-admin-password
  # Rotate root password on first reconcile — prevents shared credential usage
  rootPasswordRotation:
    enable: true
    rotationPeriod: 720h
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: DatabaseSecretEngineRole
metadata:
  name: read-only
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: database-demo/database
  # Name of the DatabaseSecretEngineConfig this role uses
  dBName: postgresql-config
  # TTL for generated credentials
  defaultTTL: 1h
  maxTTL: 24h
  # SQL statements to create a temporary user — uses Vault template variables
  creationStatements:
    - CREATE ROLE "{{name}}" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}'; GRANT SELECT ON ALL TABLES IN SCHEMA public TO "{{name}}";
  # SQL statements to revoke access when the lease expires
  revocationStatements:
    - REVOKE ALL PRIVILEGES ON ALL TABLES IN SCHEMA public FROM "{{name}}"; DROP ROLE IF EXISTS "{{name}}";
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: DatabaseSecretEngineStaticRole
metadata:
  name: app-user-rotation
spec:
  # How the operator authenticates to Vault to perform this operation
  authentication:
    path: kubernetes
    role: policy-admin
  # Full engine path: {mount's spec.path}/{mount's metadata.name}
  path: database-demo/database
  # Name of the DatabaseSecretEngineConfig this static role uses
  dBName: postgresql-config
  # Pre-existing database user whose password Vault will rotate
  username: app-user
  # Seconds between automatic password rotations (86400 = 24 hours)
  rotationPeriod: 86400
  # SQL statement to change the user's password
  rotationStatements:
    - ALTER ROLE "{{name}}" WITH PASSWORD '{{password}}';
  # Credential type — password or rsa_private_key
  credentialType: password
  # Password generation settings (only used with credentialType: password)
  passwordCredentialConfig:
    passwordPolicy: my-custom-policy
